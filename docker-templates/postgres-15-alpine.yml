version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres
    restart: always
    environment:
      # Credenciales por defecto para PostgreSQL
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      # Base de datos inicial (opcional)
      # POSTGRES_DB: nombre_de_tu_db
    ports:
      - "5432:5432"
    volumes:
      # OPCIÓN A: Bind Mount (Recomendado para ver archivos en local en tu Mac)
      - ./postgres_data:/var/lib/postgresql/data
      # OPCIÓN B: Volumen nombrado (uso profesional)
      # - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

