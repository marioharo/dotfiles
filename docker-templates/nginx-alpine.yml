version: '3.8'

services:
  nginx-server:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      # Mapea tu carpeta local con el código HTML/CSS/JS al contenedor
      - ./html:/usr/share/nginx/html:ro
      # Opcional: Mapea una configuración personalizada de Nginx
      # - ./nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
